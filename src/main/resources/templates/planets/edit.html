<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Planet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Edit Planet</h1>
    <form th:action="@{/planets/update/{id}(id=${planet.id})}" th:object="${planet}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
        </div>
        <div class="mb-3">
            <label class="form-label">Climate</label>
            <input type="text" th:field="*{climate}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a th:href="@{/planets}" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
