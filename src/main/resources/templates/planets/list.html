<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Galactic Planets</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Galactic Planets</h1>
    <div class="mb-3">
        <a th:href="@{/planets/new}" class="btn btn-primary">Discover New Planet</a>
        <a th:href="@{/}" class="btn btn-secondary">Home</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Climate</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="planet : ${planets}">
                <td th:text="${planet.id}"></td>
                <td th:text="${planet.name}"></td>
                <td th:text="${planet.climate}"></td>
                <td>
                    <a th:href="@{/planets/edit/{id}(id=${planet.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/planets/delete/{id}(id=${planet.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
