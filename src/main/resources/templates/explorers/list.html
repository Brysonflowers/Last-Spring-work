<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Galactic Explorers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Galactic Explorers</h1>
    <div class="mb-3">
        <a th:href="@{/explorers/new}" class="btn btn-primary">Recruit New Explorer</a>
        <a th:href="@{/}" class="btn btn-secondary">Home</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Specialization</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="explorer : ${explorers}">
                <td th:text="${explorer.id}"></td>
                <td th:text="${explorer.name}"></td>
                <td th:text="${explorer.specialization}"></td>
                <td>
                    <a th:href="@{/explorers/edit/{id}(id=${explorer.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/explorers/delete/{id}(id=${explorer.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Dismiss</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
