<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Recruit New Explorer</h1>
    <form th:action="@{/explorers}" th:object="${explorer}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
        </div>
        <div class="mb-3">
            <label class="form-label">Specialization</label>
            <input type="text" th:field="*{specialization}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Recruit</button>
        <a th:href="@{/explorers}" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
