<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Edit Explorer</h1>
    <form th:action="@{/explorers/update/{id}(id=${explorer.id})}" th:object="${explorer}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Specialization</label>
            <input type="text" th:field="*{specialization}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a th:href="@{/explorers}" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
