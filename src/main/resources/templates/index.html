<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Galactic Exploration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="jumbotron">
        <h1 class="display-4">Galactic Exploration System</h1>
        <p class="lead">Manage interstellar planets, explorers, and missions.</p>
        <hr class="my-4">
        <h3>User Interfaces</h3>
        <div class="list-group mb-4">
            <a th:href="@{/missions}" class="list-group-item list-group-item-action">Mission Control (Thymeleaf UI)</a>
            <a th:href="@{/planets}" class="list-group-item list-group-item-action">Planetary Directory (Thymeleaf UI)</a>
            <a th:href="@{/explorers}" class="list-group-item list-group-item-action">Explorer Registry (Thymeleaf UI)</a>
        </div>

        <h3>REST API Endpoints</h3>
        <div class="list-group">
            <a href="/api/planets" class="list-group-item list-group-item-action">GET /api/planets</a>
            <a href="/api/explorers" class="list-group-item list-group-item-action">GET /api/explorers</a>
            <a href="/api/missions" class="list-group-item list-group-item-action">GET /api/missions</a>
        </div>
    </div>
</body>
</html>
