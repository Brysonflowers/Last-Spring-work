<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Mission</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Edit Mission</h1>
    <form th:action="@{/missions/update/{id}(id=${mission.id})}" th:object="${mission}" method="post">
        <div class="mb-3">
            <label class="form-label">Objective</label>
            <input type="text" th:field="*{objective}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('objective')}" th:errors="*{objective}">Objective Error</div>
        </div>
        <div class="mb-3">
            <label class="form-label">Planet</label>
            <select th:field="*{planet}" class="form-control" required>
                <option th:each="p : ${planets}" th:value="${p.id}" th:text="${p.name}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('planet')}" th:errors="*{planet}">Planet Error</div>
        </div>
        <div class="mb-3">
            <label class="form-label">Explorers</label>
            <select th:field="*{explorers}" class="form-control" multiple>
                <option th:each="e : ${explorers}" th:value="${e.id}" th:text="${e.name}"
                        th:selected="${mission.explorers.contains(e)}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a th:href="@{/missions}" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
