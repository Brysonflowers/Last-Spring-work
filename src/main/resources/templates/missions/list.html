<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Galactic Missions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Galactic Missions</h1>
    <a th:href="@{/missions/new}" class="btn btn-primary mb-3">Launch New Mission</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Objective</th>
                <th>Planet</th>
                <th>Explorers</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="mission : ${missions}">
                <td th:text="${mission.id}"></td>
                <td th:text="${mission.objective}"></td>
                <td th:text="${mission.planet.name}"></td>
                <td>
                    <ul>
                        <li th:each="explorer : ${mission.explorers}" th:text="${explorer.name}"></li>
                    </ul>
                </td>
                <td>
                    <a th:href="@{/missions/edit/{id}(id=${mission.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/missions/delete/{id}(id=${mission.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Abort</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
